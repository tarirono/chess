<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Ecosystem — Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
      href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<style>
  body { background:#0f1117; color:#e0e0e0; font-family:'Segoe UI',sans-serif; }
  .card { background:#1a1d27; border:1px solid #2a2d3a; border-radius:12px; }
  .card-title { color:#7eb8f7; font-size:13px; text-transform:uppercase;
                letter-spacing:1px; margin-bottom:8px; }
  .badge-skill { background:#1e3a5f; color:#7eb8f7; border-radius:20px;
                 padding:3px 10px; font-size:11px; margin:2px; display:inline-block; }
  .badge-zpd   { background:#1a3a1a; color:#5cb85c; border-radius:20px;
                 padding:3px 10px; font-size:11px; margin:2px; display:inline-block; }
  .badge-hard  { background:#3a1a1a; color:#e05050; border-radius:20px;
                 padding:3px 10px; font-size:11px; margin:2px; display:inline-block; }
  .move-row { border-bottom:1px solid #2a2d3a; padding:5px 0; font-size:12px; }
  .pgn-box { background:#0f1117; border-radius:8px; padding:10px;
             font-family:monospace; font-size:12px; color:#a0c4ff; min-height:36px; }
  .skill-bar  { height:5px; border-radius:3px; background:#2a2d3a; margin-top:3px; }
  .skill-fill { height:100%; border-radius:3px; background:#7eb8f7; }
  .form-control, .form-select {
    background:#0f1117 !important; border-color:#2a2d3a !important;
    color:#e0e0e0 !important; }
  .form-control:focus, .form-select:focus {
    border-color:#7eb8f7 !important; box-shadow:none !important; }
  .btn-primary { background:#1e3a5f; border-color:#2a4d7f; }
  .btn-primary:hover { background:#2a4d7f; }
  .btn-success { background:#1a3a1a; border-color:#2a5a2a; }
  .btn-success:hover { background:#2a5a2a; }
  h1 { color:#7eb8f7; font-size:20px; font-weight:600; }
  #board { width:100% !important; }
  .status-active   { color:#5cb85c; }
  .status-finished { color:#e05050; }
  .status-waiting  { color:#f0ad4e; }
</style>
</head>
<body>
<div class="container-fluid py-3">

  <div class="d-flex align-items-center justify-content-between mb-3 px-2">
    <h1>♟ Chess Ecosystem — PFE 2025</h1>
  </div>

  <div class="row g-3">

    <!-- LEFT -->
    <div class="col-md-4">
      <div class="card p-3 mb-3">
        <div class="card-title">New Game</div>
        <input type="text" id="player-id" class="form-control form-control-sm mb-2"
               placeholder="Player ID" value="adam">
        <select id="player-elo" class="form-select form-select-sm mb-2">
          <option value="1200">Elo 1200 — Beginner bot</option>
          <option value="1400" selected>Elo 1400 — Intermediate bot</option>
          <option value="1600">Elo 1600 — Advanced bot</option>
        </select>
        <button class="btn btn-primary btn-sm w-100" onclick="newGame()">
          Start Game
        </button>
        <div id="game-status" class="text-center mt-2 status-waiting small">
          No active game
        </div>
      </div>

      <div class="card p-3">
        <div class="card-title">Board</div>
        <div id="board"></div>
        <div class="mt-2 text-center small" id="turn-indicator">—</div>
      </div>
    </div>

    <!-- MIDDLE -->
    <div class="col-md-4">
      <div class="card p-3 mb-3">
        <div class="card-title">Make a Move</div>
        <div class="input-group input-group-sm mb-2">
          <input type="text" id="move-input" class="form-control"
                 placeholder="e.g. e2e4" maxlength="5">
          <button class="btn btn-success" onclick="makeMove()">Play</button>
        </div>
        <div id="move-error" class="text-danger small"></div>
        <div class="mt-2">
          <div class="card-title">Last move skills</div>
          <div id="last-skills" class="small">—</div>
        </div>
      </div>

      <div class="card p-3 mb-3">
        <div class="card-title">PGN</div>
        <div class="pgn-box" id="pgn-box">—</div>
      </div>

      <div class="card p-3">
        <div class="card-title">Move History</div>
        <div id="move-history" style="max-height:200px;overflow-y:auto"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-md-4">
      <div class="card p-3 mb-3">
        <div class="card-title">Practice Now (ZPD)</div>
        <div id="zpd-recs" class="small">
          Play a few moves to see recommendations.
        </div>
      </div>

      <div class="card p-3">
        <div class="card-title">Skill Profile</div>
        <div id="skill-profile" class="small">—</div>
        <button class="btn btn-primary btn-sm w-100 mt-2"
                onclick="refreshSkills()">
          Refresh Skills
        </button>
      </div>
    </div>

  </div>
</div>

<script>
let board = null;

function initBoard(fen) {
  const cfg = {
    position: fen || 'start',
    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
  };
  if (board) { board.position(fen || 'start'); }
  else       { board = Chessboard('board', cfg); }
}

function newGame() {
  const pid = document.getElementById('player-id').value || 'player_1';
  const elo = parseInt(document.getElementById('player-elo').value);

  fetch('/api/new_game', {
    method:  'POST',
    headers: {'Content-Type': 'application/json'},
    body:    JSON.stringify({player_id: pid, elo: elo})
  })
  .then(r => r.json())
  .then(state => {
    updateUI(state);
    document.getElementById('game-status').textContent =
      'Game ' + state.game_id + ' — Active';
    document.getElementById('game-status').className =
      'text-center mt-2 status-active small';
  })
  .catch(e => console.error('newGame error:', e));
}

function makeMove() {
  const uci = document.getElementById('move-input').value.trim().toLowerCase();
  document.getElementById('move-error').textContent = '';

  fetch('/api/move', {
    method:  'POST',
    headers: {'Content-Type': 'application/json'},
    body:    JSON.stringify({uci: uci})
  })
  .then(r => r.json())
  .then(state => {
    if (state.error) {
      document.getElementById('move-error').textContent = state.error;
      return;
    }
    document.getElementById('move-input').value = '';
    updateUI(state);
    if (state.status === 'finished') {
      document.getElementById('game-status').textContent = 'Game finished!';
      document.getElementById('game-status').className =
        'text-center mt-2 status-finished small';
      refreshSkills();
    }
  })
  .catch(e => console.error('makeMove error:', e));
}

function updateUI(state) {
  initBoard(state.fen);

  document.getElementById('turn-indicator').textContent =
    state.turn === 'white' ? '⬜ White to move' : '⬛ Black to move';

  document.getElementById('pgn-box').textContent = state.pgn || '—';

  if (state.last_entry && state.last_entry.skills) {
    document.getElementById('last-skills').innerHTML =
      state.last_entry.skills
        .map(s => '<span class="badge-skill">' + s + '</span>')
        .join('') || '—';
  }

  const hist = state.history || [];
  document.getElementById('move-history').innerHTML = hist.map(h =>
    '<div class="move-row">' +
    '<span style="color:#7eb8f7">Move ' + h.move_number + '</span> ' +
    'You: <b>' + h.player_move + '</b>' +
    (h.bot_move ? ' &nbsp; Bot: <b>' + h.bot_move + '</b>' : '') +
    '<br><small style="color:#666">' + (h.skills || []).join(', ') + '</small>' +
    '</div>'
  ).join('') || '—';

  if (state.zpd && state.zpd.length > 0) {
    document.getElementById('zpd-recs').innerHTML = state.zpd.map(z => {
      const pct = Math.round(z.probability * 100);
      const cls = z.category === 'zpd'      ? 'badge-zpd'   :
                  z.category === 'too_hard'  ? 'badge-hard'  : 'badge-skill';
      return '<div class="mb-2">' +
        '<span class="' + cls + '">' + z.skill + '</span>' +
        '<small class="ms-2" style="color:#666">' +
          pct + '% success · ' + z.attempts + ' attempts</small>' +
        '<div class="skill-bar">' +
          '<div class="skill-fill" style="width:' + pct + '%"></div></div>' +
        '</div>';
    }).join('');
  }
}

function refreshSkills() {
  fetch('/api/skills')
  .then(r => r.json())
  .then(data => {
    const all = [
      ...(data.mastered      || []),
      ...(data.practice_now  || []),
      ...(data.not_ready     || [])
    ];
    if (!all.length) {
      document.getElementById('skill-profile').innerHTML =
        '<small style="color:#666">Play more moves to build your profile.</small>';
      return;
    }
    document.getElementById('skill-profile').innerHTML = all.map(s => {
      const pct = Math.round(s.probability * 100);
      const cls = s.category === 'mastered' ? 'badge-skill' :
                  s.category === 'zpd'      ? 'badge-zpd'   : 'badge-hard';
      const lbl = s.category === 'mastered' ? '✓' :
                  s.category === 'zpd'      ? '→' : '✗';
      return '<div class="mb-2">' +
        '<span class="' + cls + '">' + lbl + ' ' + s.skill + '</span>' +
        '<small class="ms-2" style="color:#666">' +
          pct + '% · ' + s.attempts + ' tries</small>' +
        '<div class="skill-bar">' +
          '<div class="skill-fill" style="width:' + pct + '%"></div></div>' +
        '</div>';
    }).join('');
  })
  .catch(e => console.error('refreshSkills error:', e));
}

$(document).ready(function() {
  initBoard('start');
  $('#move-input').on('keypress', function(e) {
    if (e.key === 'Enter') makeMove();
  });
});
</script>
</body>
</html>
